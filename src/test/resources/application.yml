# ============================================================
# PricingTool Test Automation - Consolidated Configuration
# ============================================================
# Usage:
#   Default (H2):    mvn test
#   Local:           mvn test -Dspring.profiles.active=local
#   CI:              mvn test -Dspring.profiles.active=ci
#   Docker:          mvn test -Dspring.profiles.active=docker
#   Or via env var:  SPRING_PROFILES_ACTIVE=local mvn test
# ============================================================

# --- Default profile (H2 in-memory) ---
# To switch environment, change the active profile below.
# Options: local, ci, docker (or remove/comment out for H2 default)
# CLI and env vars override this: mvn test -Dspring.profiles.active=ci
spring:
  profiles:
    active: local
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

test:
  env:
    base-url: http://localhost:3000

logging:
  level:
    com.pricingtool.test: INFO
    org.springframework.jdbc: WARN

---
# --- Local profile (H2 in-memory with debug logging) ---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:testdb_local
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

test:
  env:
    base-url: http://localhost:3000

logging:
  level:
    com.pricingtool.test: DEBUG
    org.springframework.jdbc: DEBUG

---
# --- CI profile (SQL Server in CI environment) ---
spring:
  config:
    activate:
      on-profile: ci
  datasource:
    url: jdbc:sqlserver://ci-sqlserver:1433;databaseName=pricingtool_pricing_ci;encrypt=true;trustServerCertificate=true
    username: ci_user
    password: CiTestPassword456!
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.SQLServerDialect

test:
  env:
    base-url: https://www.ecohavenboots.co.uk

logging:
  level:
    com.pricingtool.test: INFO
    org.springframework.jdbc: WARN

---
# --- Docker profile (H2 in-memory, headless Playwright) ---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:h2:mem:testdb_docker
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

test:
  env:
    base-url: https://www.ecohavenboots.co.uk

logging:
  level:
    com.pricingtool.test: INFO
    org.springframework.jdbc: WARN
